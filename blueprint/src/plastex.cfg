[general]
renderer=HTML5
copy-theme-extras=yes
plugins=plastexdepgraph  plastexshowmore  leanblueprint

[document]
toc-depth=3
toc-non-files=True

[files]
directory=../web/
split-level= 0

[html5]
localtoc-level=0
extra-css=extra_styles.css
mathjax-url=https://cdn.jsdelivr.net/npm/@mathjax/mathjax-tex-font@4.1.1/tex-mml-chtml-mathjax-tex.js
mathjax-dollars=False
filters=../src/mathjax_bbm_filter.py
